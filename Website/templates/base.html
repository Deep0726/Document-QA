<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AI Document Query{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: 'hsl(210,33%,99%)',
            foreground: 'hsl(222,47%,11%)',
            primary: {DEFAULT:'hsl(221,83%,53%)', foreground:'hsl(210,40%,98%)'},
            secondary: {DEFAULT:'hsl(214,32%,91%)', foreground:'hsl(222,47%,11%)'},
            muted: {DEFAULT:'hsl(214,32%,96%)', foreground:'hsl(215,16%,47%)'},
            card: {DEFAULT:'hsl(0,0%,100%)', foreground:'hsl(222,47%,11%)'},
            border: 'hsl(214,32%,91%)',
            destructive: {DEFAULT:'hsl(0,84%,60%)'},
          },
          fontFamily: {
            sans: ['Inter','sans-serif'],
            display: ['Outfit','sans-serif'],
          },
          borderRadius: {
            lg: '0.75rem',
            xl: '1rem',
            '2xl': '1.5rem',
            '3xl': '2rem',
          },
        }
      }
    }
  </script>
  {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-background text-foreground font-sans antialiased">
  {% block content %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
